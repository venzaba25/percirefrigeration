kind = "web"
previewPath = "/"
title = "Perci Refrigeration & Airconditioning Services"
version = "1.0.0"
id = "artifacts/perci-hvac"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23660

[services.development]
run = "pnpm --filter @workspace/perci-hvac run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perci-hvac", "run", "build" ]
publicDir = "artifacts/perci-hvac/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23660"
BASE_PATH = "/"
